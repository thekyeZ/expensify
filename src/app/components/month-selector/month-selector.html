<div class="flex items-center gap-1">
  <button
    type="button"
    (click)="previous.emit()"
    aria-label="Poprzedni miesiąc"
    class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-500 transition hover:bg-violet-50 hover:text-violet-600"
  >
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
  </button>

  <span class="min-w-32 text-center text-sm font-semibold text-slate-700">{{ label() }}</span>

  <button
    type="button"
    (click)="next.emit()"
    aria-label="Następny miesiąc"
    class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-500 transition hover:bg-violet-50 hover:text-violet-600"
  >
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
    </svg>
  </button>
</div>
