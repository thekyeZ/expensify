<div class="min-h-screen pb-24 lg:pb-10">
  <header class="sticky top-0 z-40 border-b border-slate-100 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2.5">
        <div
          class="flex h-9 w-9 items-center justify-center rounded-xl bg-indigo-600 text-base font-bold text-white shadow-sm"
        >
          E
        </div>
        <span class="text-xl font-bold tracking-tight text-slate-900">Expensify</span>
      </div>

      <div class="flex items-center gap-1">
        <button
          type="button"
          aria-label="Powiadomienia"
          class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
          </svg>
        </button>
        <button
          type="button"
          aria-label="Profil użytkownika"
          class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl space-y-5 px-4 py-5 sm:py-6">
    <section>
      <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Witaj z powrotem</h1>
      <p class="mt-1 text-sm text-slate-500">Oto Twoje finanse na dziś.</p>
    </section>

    @if (store.errorMessage(); as error) {
      <div class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700 ring-1 ring-red-100">
        {{ error }}
      </div>
    }

    <section class="rounded-2xl bg-white p-2 shadow-sm ring-1 ring-slate-100">
      <app-month-selector
        [label]="store.monthLabel()"
        (previous)="store.previousMonth()"
        (next)="store.nextMonth()"
      />
    </section>

    <app-budget-summary
      [budgetAmount]="store.budgetAmount()"
      [totalSpent]="store.totalSpent()"
      [usagePercent]="store.usagePercent()"
      [barClass]="store.progressBarClass()"
      [loading]="store.loading()"
      (budgetChange)="store.setBudget($event)"
    />

    <div class="grid gap-5 lg:grid-cols-5">
      <div class="lg:col-span-2">
        <app-expense-form (add)="store.addExpense($event)" />
      </div>

      <section class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-100 sm:p-6 lg:col-span-3">
        <h2 class="text-base font-semibold text-slate-900">Ostatnie transakcje</h2>

        <div class="mt-2">
          @defer (on viewport) {
            @if (store.loading()) {
              <div class="animate-pulse space-y-3 py-3" aria-label="Ładowanie transakcji">
                @for (row of [1, 2, 3, 4]; track row) {
                  <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-xl bg-slate-100"></div>
                    <div class="flex-1 space-y-2">
                      <div class="h-3 w-1/2 rounded bg-slate-100"></div>
                      <div class="h-2.5 w-1/3 rounded bg-slate-100"></div>
                    </div>
                    <div class="h-3 w-14 rounded bg-slate-100"></div>
                  </div>
                }
              </div>
            } @else {
              <app-expense-list [expenses]="store.expenses()" (remove)="store.removeExpense($event)" />
            }
          } @placeholder {
            <div class="py-10 text-center text-sm text-slate-400">Ładowanie…</div>
          }
        </div>
      </section>
    </div>
  </main>

  <div class="lg:hidden">
    <app-bottom-nav />
  </div>
</div>
